name: spy-sim

# Fires at Nasdaq open (09:30 America/New_York) Mon-Fri.
# Two crons cover EDT (summer) + EST (winter); spy_sim.py self-gates on weekends.
on:
  schedule:
    - cron: "30 13 * * 1-5"   # 09:30 ET during EDT (UTC-4)
    - cron: "30 14 * * 1-5"   # 09:30 ET during EST (UTC-5)
  workflow_dispatch: {}

concurrency:
  group: spy-sim
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run SPY simulator
        run: python spy_sim.py

      - name: Commit state + report
        run: |
          git config user.name  "spy-sim-bot"
          git config user.email "bot@users.noreply.github.com"
          git add spy_sim_state.json reports/spy_sim 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git pull --rebase --autostash origin ${GITHUB_REF_NAME} || true
            git commit -m "spy-sim $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
