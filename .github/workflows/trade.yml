name: ai4trade-bot

on:
  schedule:
    - cron: "37 12 * * 1-5"
    - cron: "3,13,23,33,43,53 13-19 * * 1-5"
    - cron: "53 19 * * 1-5"
    - cron: "7 20 * * 6"
  workflow_dispatch:
    inputs:
      mode:
        description: "auto | premarket | weekly"
        required: false
        default: "auto"

concurrency:
  group: ai4trade-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet pytz

      - name: Run ai4trade momentum bot
        env:
          AI4TRADE_TOKEN: ${{ secrets.AI4TRADE_TOKEN }}
          BUDGET_USD: "100"
          MODE: ${{ inputs.mode || 'auto' }}
        run: python bot.py

      - name: Run SPY $200 TA simulator
        continue-on-error: true
        run: python spy_sim.py

      - name: Run AMD $200 TA simulator
        continue-on-error: true
        run: python amd_sim.py

      - name: Commit state + reports
        run: |
          git config user.name  "ai4trade-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git pull --rebase --autostash origin ${GITHUB_REF_NAME} || true
            git commit -m "bot $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
