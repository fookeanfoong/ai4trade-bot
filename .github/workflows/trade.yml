name: ai4trade-bot

# Cron is UTC. Times below map for EDT (UTC-4, summer). The bot self-gates on
# US market hours so extra fires are safe. In winter (EST) shift +1h if you
# want exact alignment, or just leave it.
on:
  schedule:
    - cron: "30 12 * * 1-5"      # ~08:30 ET  PRE-MARKET research digest
    - cron: "*/10 13-19 * * 1-5" # every 10 min from 09:00-15:59 ET (news + trade)
    - cron: "50 19 * * 1-5"      # ~15:50 ET  near close (daily reflection)
    - cron: "0 20 * * 6"         # 16:00 ET Sat  WEEKLY summary
  workflow_dispatch:
    inputs:
      mode:
        description: "auto | premarket | weekly (manual override)"
        required: false
        default: "auto"

concurrency:
  group: ai4trade-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet pytz

      - name: Resolve mode
        id: mode
        run: |
          if [ -n "${{ inputs.mode }}" ] && [ "${{ inputs.mode }}" != "auto" ]; then
            echo "value=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 12 * * 1-5" ]; then
            echo "value=premarket" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 20 * * 6" ]; then
            echo "value=weekly" >> $GITHUB_OUTPUT
          else
            echo "value=auto" >> $GITHUB_OUTPUT
          fi

      - name: Run bot
        env:
          AI4TRADE_TOKEN: ${{ secrets.AI4TRADE_TOKEN }}
          BUDGET_USD: "100"
          MODE: ${{ steps.mode.outputs.value }}
        run: python bot.py

      - name: Commit state + reports
        run: |
          git config user.name  "ai4trade-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git pull --rebase --autostash origin ${GITHUB_REF_NAME} || true
            git commit -m "bot ${MODE} $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
        env:
          MODE: ${{ steps.mode.outputs.value }}
