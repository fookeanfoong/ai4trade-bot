name: ai4trade-bot

# Cron in UTC. Times target EDT (UTC-4). Bot self-gates on NY wall-clock so
# late-firing crons still land in the right mode. Minutes intentionally OFF
# :00/:30 boundaries to reduce GitHub queue drops on private repos.
on:
  schedule:
    - cron: "37 12 * * 1-5"      # ~08:37 ET  pre-market
    - cron: "3,13,23,33,43,53 13-19 * * 1-5"  # every 10 min, off-round
    - cron: "53 19 * * 1-5"      # ~15:53 ET  close reflection
    - cron: "7 20 * * 6"         # Sat 16:07 ET  weekly summary
  workflow_dispatch:
    inputs:
      mode:
        description: "auto | premarket | weekly (manual override, default auto)"
        required: false
        default: "auto"

concurrency:
  group: ai4trade-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet pytz

      - name: Run bot
        env:
          AI4TRADE_TOKEN: ${{ secrets.AI4TRADE_TOKEN }}
          BUDGET_USD: "100"
          # Mode is decided by bot.py based on NY wall-clock, so cron delays
          # don't waste market-hours slots on premarket digests.
          MODE: ${{ inputs.mode || 'auto' }}
        run: python bot.py

      - name: Commit state + reports
        run: |
          git config user.name  "ai4trade-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git pull --rebase --autostash origin ${GITHUB_REF_NAME} || true
            git commit -m "bot $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
