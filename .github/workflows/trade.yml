name: ai4trade-bot

# Cron in UTC. Bots self-gate on NY wall-clock, so extra runs outside RTH are no-ops.
# GitHub's scheduled crons are unreliable (delayed/skipped under load), so we run
# DENSE (every 5 min, the GitHub minimum) to raise the odds one fires near the open,
# AND a claude-code-remote "market-open kick" routine dispatches this workflow at the
# open as a reliable backstop if GitHub drops the whole window.
on:
  schedule:
    - cron: "32,37,47,57 12 * * 1-5"   # premarket (multiple, ~08:3x ET)
    - cron: "*/5 13-21 * * 1-5"        # every 5 min across the session (covers EDT+EST)
    - cron: "7 20 * * 6"               # Sat weekly review
  push:
    paths:
      - ".trigger"                      # reliable kick: a routine touches this file to fire a run
                                        # (push events are prompt; bot state-commits never touch it, so no loop)
  workflow_dispatch:
    inputs:
      mode:
        description: "auto | premarket | weekly"
        required: false
        default: "auto"

concurrency:
  group: ai4trade-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    env:
      # Exposed to steps (and their `if:`) so the Alpaca step stays dormant until
      # you add the secret, then activates automatically. Paper by default.
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet pytz

      - name: Install Alpaca SDK (only if key is set)
        if: ${{ env.ALPACA_API_KEY_ID != '' }}
        run: pip install --quiet -r requirements-alpaca.txt

      - name: Fetch live quotes
        continue-on-error: true
        run: python quotes.py

      - name: Fetch market-mover news
        continue-on-error: true
        run: python news.py

      # 自动生成当日信号 -> signals.json,再转成 PWA 数据源。
      # 想只做多(散户友好),把下面 env 的 LONG_ONLY 设为 "1"。
      - name: Generate today's signals (algorithmic)
        continue-on-error: true
        env:
          LONG_ONLY: "1"    # 默认只做多(散户友好);想同时发空单就设为 ""
        run: python generate_signals.py

      - name: Build PWA signal feed
        continue-on-error: true
        run: python pwa/build_feed.py

      - name: Run ai4trade momentum bot
        env:
          AI4TRADE_TOKEN: ${{ secrets.AI4TRADE_TOKEN }}
          BUDGET_USD: "100"
          MODE: ${{ inputs.mode || 'auto' }}
        run: python bot.py

      - name: Run SPY $200 TA simulator
        continue-on-error: true
        run: python spy_sim.py

      - name: Run AMD $200 TA simulator
        continue-on-error: true
        run: python amd_sim.py

      - name: Run structured signal sim
        continue-on-error: true
        run: python signal_sim.py

      - name: Alpaca paper trade (real execution, cloud, only if key is set)
        if: ${{ env.ALPACA_API_KEY_ID != '' }}
        continue-on-error: true
        env:
          BROKER: alpaca
          ALPACA_PAPER: "true"     # fake money until you flip this to false + confirm
          BOOK_EQUITY: "200"
          RISK_PCT: "0.05"
          LEVERAGE_CAP: "2.0"
        run: python live_trader.py

      - name: Commit state + reports
        if: always()   # 即使前面某步失败,也要把已生成的信号/状态提交上去
        run: |
          git config user.name  "ai4trade-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git pull --rebase --autostash origin ${GITHUB_REF_NAME} || true
            git commit -m "bot $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
