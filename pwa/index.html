<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />

  <!-- SEO -->

  <meta name="keywords" content="stock signals, pre-market signals, daily watchlist, trading app, entry stop target, position sizing" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://aicompareapi.vercel.app/" />

  <!-- Open Graph / 分享卡片 -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="AI4Trade Signals" />
  <meta property="og:title" content="AI4Trade Signals — know what to watch before the open" />
  <meta property="og:description" content="A few tickers a day with exact buy / stop / target prices, sized to your capital. First trading day free. Educational, not investment advice." />

  <link rel="apple-touch-icon" href="./icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- 顶栏 -->
  <header class="topbar">
    <div class="brand" id="brandName">AI4Trade</div>
    <div class="row" style="gap:8px">
      <button class="ghost-btn" id="langBtn">🌐 EN</button>
      <button class="ghost-btn" id="statusChip" hidden></button>
    </div>
  </header>

  <main id="view"><!-- JS 渲染 --></main>

  <!-- 底部导航 -->
  <nav class="tabbar" id="tabbar" hidden>
    <button data-tab="today" class="tab active">今日信号</button>
    <button data-tab="record" class="tab" data-feature="trackRecord" hidden>战绩</button>
    <button data-tab="plan" class="tab">我的计划</button>
    <button data-tab="feedback" class="tab">反馈</button>
    <button data-tab="account" class="tab">账户</button>
  </nav>

  <script src="./config.js"></script>
  <script src="./i18n.js"></script>
  <script src="./legal.js"></script>
  <script src="./app.js"></script>
